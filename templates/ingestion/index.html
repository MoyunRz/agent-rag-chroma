<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>文档入库</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
    .msg { background: #d4edda; padding: .5rem 1rem; border-radius: 4px; }
    .err { background: #f8d7da; padding: .5rem 1rem; border-radius: 4px; }
    form { background: #f5f5f5; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
    label { display: block; margin: .5rem 0 .2rem; font-weight: bold; }
    select, input[type=file] { width: 100%; padding: .4rem; margin-bottom: .5rem; }
    button { padding: .5rem 1.5rem; font-size: 1rem; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .5rem; border-bottom: 1px solid #ddd; text-align: left; }
    a { color: #333; }
  </style>
</head>
<body>
  <h1>文档入库</h1>
  <p><a href="/">知识库管理</a> | <a href="/rag/">RAG 问答</a></p>

  {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
  {% if error %}<div class="err">{{ error }}</div>{% endif %}

  <form method="post" enctype="multipart/form-data" action="{% url 'ingestion:upload' %}">
    {% csrf_token %}
    <label>知识库</label>
    <select name="kb_id" required>
      <option value="">-- 选择知识库 --</option>
      {% for kb in kb_list %}
        <option value="{{ kb.id }}">{{ kb.name }}</option>
      {% endfor %}
    </select>

    <label>文档文件</label>
    <input type="file" name="file" accept=".txt,.md,.pdf,.docx,.doc" required>
    <p style="color:#888;font-size:.8rem;">支持 TXT / Markdown / PDF / Word</p>

    <button type="submit">上传并入库</button>
  </form>

  <h2>最近入库</h2>
  <table>
    <tr><th>标题</th><th>知识库</th><th>时间</th></tr>
    {% for doc in documents %}
    <tr><td>{{ doc.title }}</td><td>{{ doc.kb.name }}</td><td>{{ doc.created_at|date:"Y-m-d H:i" }}</td></tr>
    {% empty %}
    <tr><td colspan="3">暂无文档</td></tr>
    {% endfor %}
  </table>
</body>
</html>
